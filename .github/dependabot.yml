version: 2
updates:
  # uv-managed stack (pyproject.toml + uv.lock); "uv" updates the lockfile
  # incl. transitive deps, which "pip" cannot.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "deps"
    groups:
      # Bundle routine minor/patch bumps into one PR; majors still land alone.
      python-dev:
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        update-types: ["minor", "patch"]
