name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v7
      - name: Read Python version
        id: pyver
        run: echo "value=$(cat .python-version)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.pyver.outputs.value }}
      - uses: astral-sh/setup-uv@v7
      - run: make deps
      - run: make lint

  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v7
      - name: Read Python version
        id: pyver
        run: echo "value=$(cat .python-version)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.pyver.outputs.value }}
      - uses: astral-sh/setup-uv@v7
      - run: make deps
      - run: make coverage

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v7
      - name: Read Python version
        id: pyver
        run: echo "value=$(cat .python-version)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.pyver.outputs.value }}
      - uses: astral-sh/setup-uv@v7
      - run: make deps
      - run: make security
